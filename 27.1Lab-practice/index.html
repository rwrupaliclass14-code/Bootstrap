<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Team</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>

    <section class="container py-5">

                    <div class="card-body">
                        <img src="https://placehold.co/150x150/e2e8f0/1e293b?text=JD"
                            class="rounded-circle img-fluid mb-3" alt="John Doe" style="width: 150px; height: 150px;" />
                        <h5 class="card-title fw-bold mb-1">John Doe</h5>
                        <p>Frontend Developer</p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-3">
                <div class="card shadow-sm text-center my-3">
                    <div class="card-body">
                        <img src="https://placehold.co/150x150/b2ebf2/006064?text=JS"
                            class="rounded-circle img-fluid mb-3" alt="Jane Smith"
                            style="width: 150px; height: 150px;" />
                        <h5 class="card-title fw-bold mb-1">Jane Smith</h5>
                        <p>UI Designer</p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-3">
                <div class="card shadow-sm text-center my-3">
                    <div class="card-body">
                        <img src="https://placehold.co/150x150/4dd0e1/ffffff?text=AB"
                            class="rounded-circle img-fluid mb-3" alt="Alex Brown"
                            style="width: 150px; height: 150px;" />
                        <h5 class="card-title fw-bold mb-1">Alex Brown</h5>
                        <p>Backend Developer</p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-3">
                <div class="card shadow-sm text-center my-3">
                    <div class="card-body">
                        <img src="https://placehold.co/150x150/e2e8f0/1e293b?text=ED"
                            class="rounded-circle img-fluid mb-3" alt="Emily Davis"
                            style="width: 150px; height: 150px;" />
                        <h5 class="card-title fw-bold mb-1">Emily Davis</h5>
                        <p>Project Manager</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
